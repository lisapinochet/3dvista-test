<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Température</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 🔥 Overlay température */
        .temp-display {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.78);
            color: #ffffff;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: bold;
            border-radius: 10px;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
        }
    </style>
</head>

<body>
<div class="temp-display" id="temp">
    T°C : 45°C
</div>

<script>
    // 🔄 Exemple dynamique
    const temp = 45;
    document.getElementById("temp").innerText = "T°C : " + temp + "°C";
</script>
</body>
</html>
